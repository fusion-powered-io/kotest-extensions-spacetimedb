name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      version_tag: ${{ steps.calc.outputs.version_tag }}
      changed: ${{ steps.calc.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calc
        uses: paulhatch/semantic-version@v6.0.2
        with:
          tag_prefix: "v"
          major_pattern: "feat!:"
          minor_pattern: "feat:"
          bump_each_commit: true
          bump_each_commit_patch_pattern: "fix:"

  build:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install SpacetimeDB
        run: |
          curl -sSf https://install.spacetimedb.com | sh -s -- --yes
          echo "$HOME/.local/bin" >> $GITHUB_PATH  

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build
        env:
          BACKEND_CLIENT_VERSION: ${{ needs.version.outputs.version }}

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: build/libs/*.jar

  publish:
    if: needs.version.outputs.changed == 'true'
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish to Maven Central
        run: ./gradlew publishAggregationToCentralPortal
        env:
          BACKEND_CLIENT_VERSION: ${{ needs.version.outputs.version }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  release:
    if: needs.version.outputs.changed == 'true'
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download JARs
        uses: actions/download-artifact@v8
        with:
          name: jars
          path: build/libs/

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.version.outputs.version_tag }}"
          git push origin "${{ needs.version.outputs.version_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.version.outputs.version_tag }}
          tag_name: ${{ needs.version.outputs.version_tag }}
          generate_release_notes: true
          files: |
            build/libs/*.jar
